name: Mirror 3proxy images to GHCR (2 latest)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  SOURCE_REPO: tarampampam/3proxy
  TARGET_REPO: ghcr.io/yabloky/3proxy
  KEEP: 2

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq gh

      - name: Get last 2 numeric tags from Docker Hub
        id: tags
        run: |
          KEEP=${{ env.KEEP }}
          VERSIONS=$(curl -fsSL "https://hub.docker.com/v2/repositories/${SOURCE_REPO}/tags/?page_size=100" \
            | jq --argjson k "$KEEP" -r '[ .results[].name
                        | select(test("^[0-9]+(\\.[0-9]+)*$")) ]
                      | sort_by([ split(".")[] | tonumber ])
                      | reverse
                      | .[:$k][]')
          echo "versions<<EOF" >> "$GITHUB_OUTPUT"
          echo "$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Found versions:"
          echo "$VERSIONS"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror last 2 versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TARGET="${{ env.TARGET_REPO }}"
          SOURCE="${{ env.SOURCE_REPO }}"
          KEEP=${{ env.KEEP }}
          VERSIONS="${{ steps.tags.outputs.versions }}"

          echo "Mirroring versions:"
          echo "$VERSIONS"

          LOCAL=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
            | jq -r '.[].metadata.container.tags[0]' | grep -v -E '^$|null|latest' | sort -Vr || true)

          # Добавляем новые
          while read -r VER; do
            [ -z "$VER" ] && continue
            if echo "$LOCAL" | grep -q "^${VER}$"; then
              echo "Already have ${VER}, skip"
              continue
            fi
            echo "→ Pull/push ${VER}"
            docker pull "${SOURCE}:${VER}"
            docker tag  "${SOURCE}:${VER}" "${TARGET}:${VER}"
            docker push "${TARGET}:${VER}"
          done <<< "$VERSIONS"

          # Очищаем старые, оставляем только 2
          LOCAL=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
            | jq -r '.[].metadata.container.tags[0]' | grep -v -E '^$|null|latest' | sort -Vr || true)
          CNT=$(echo "$LOCAL" | wc -l)
          if [ "$CNT" -gt "$KEEP" ]; then
            DEL=$(echo "$LOCAL" | tail -n +$((KEEP+1)))
            for OLD in $DEL; do
              ID=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
                | jq -r ".[] | select(.metadata.container.tags[0]==\"${OLD}\") | .id")
              echo "Deleting old ${OLD}"
              gh api --method DELETE -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions/${ID}
            done
          fi

          # Перетегируем latest на самую новую
          LATEST=$(echo "$VERSIONS" | head -n1)
          echo "→ Updating latest -> ${LATEST}"
          docker pull "${SOURCE}:${LATEST}"
          docker tag  "${SOURCE}:${LATEST}" "${TARGET}:latest"
          docker push "${TARGET}:latest"
