name: Mirror 3proxy images to GHCR
on:
  push:
    branches: [ master ]
  workflow_dispatch:
env:
  SOURCE_REPO: tarampampam/3proxy
  TARGET_REPO: ghcr.io/yabloky/3proxy
jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq gh
        
      - name: Get last 2 versions
        id: versions
        run: |
          VERSIONS=$(curl -s https://api.github.com/repos/tarampampam/3proxy/tags | jq -r '.[].name' | grep -E '^v?[0-9]+\.[0-9]+' | head -2 | sed 's/^v//')
          echo "versions<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Mirror and cleanup
        run: |
          TARGET="${{ env.TARGET_REPO }}"
          SOURCE="${{ env.SOURCE_REPO }}"
          
          # pull и push новые версии
          while read -r V; do
            [ -z "$V" ] && continue
            docker pull "${SOURCE}:${V}" && docker tag "${SOURCE}:${V}" "${TARGET}:${V}" && docker push "${TARGET}:${V}"
          done <<< "${{ steps.versions.outputs.versions }}"
          
          # latest = первая версия
          LATEST=$(echo "${{ steps.versions.outputs.versions }}" | head -1)
          docker tag "${TARGET}:${LATEST}" "${TARGET}:latest"
          docker push "${TARGET}:latest"
          
          # удалить все кроме 2 последних
          sleep 3
          ALL=$(gh api /users/${{ github.actor }}/packages/container/3proxy/versions | jq -r '.[].metadata.container.tags[0]' | grep -v latest | sort -Vr)
          TO_DELETE=$(echo "$ALL" | tail -n +3)
          
          for V in $TO_DELETE; do
            [ -z "$V" ] && continue
            ID=$(gh api /users/${{ github.actor }}/packages/container/3proxy/versions | jq -r ".[] | select(.metadata.container.tags[0]==\"$V\") | .id")
            [ -n "$ID" ] && gh api --method DELETE /users/${{ github.actor }}/packages/container/3proxy/versions/$ID
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
