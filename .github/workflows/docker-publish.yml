name: Mirror and Scan 3proxy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  SOURCE_REPO: tarampampam/3proxy
  TARGET_REPO: ghcr.io/yabloky/3proxy

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq gh

      - name: Get last 2 stable versions
        id: versions
        run: |
          VERSIONS=$(curl -s https://api.github.com/repos/tarampampam/3proxy/releases \
            | jq -r '[ .[] 
                | select(.tag_name 
                  | test("^[vV]?[0-9]+(\\.[0-9]+)*$")) ][0:2] 
                | .[].tag_name' \
            | sed 's/^v//')
          echo "versions<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found stable versions:"
          echo "$VERSIONS"

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror and scan last 2 versions
        run: |
          TARGET="${{ env.TARGET_REPO }}"
          SOURCE="${{ env.SOURCE_REPO }}"

          LOCAL_VERSIONS=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
            | jq -r '.[].metadata.container.tags[0]' | grep -v -E '^$|null' | sort -Vr || true)
          echo "Local versions:"
          echo "$LOCAL_VERSIONS"

          while read -r VERSION; do
            [ -z "$VERSION" ] && continue
            if echo "$LOCAL_VERSIONS" | grep -q "^$VERSION$"; then
              echo "Already have $VERSION, skipping"
              continue
            fi

            echo "-----> Pulling and scanning $VERSION"
            docker pull "${SOURCE}:$VERSION"
            docker tag  "${SOURCE}:$VERSION" "${TARGET}:$VERSION"

            echo "-----> Scanning ${TARGET}:$VERSION"
            trivy image --severity HIGH,CRITICAL --exit-code 1 "${TARGET}:$VERSION"

            echo "-----> Pushing ${TARGET}:$VERSION"
            docker push "${TARGET}:$VERSION"
          done <<< "${{ steps.versions.outputs.versions }}"

          LOCAL_VERSIONS=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
            | jq -r '.[].metadata.container.tags[0]' | grep -v -E '^$|null' | sort -Vr || true)
          COUNT=$(echo "$LOCAL_VERSIONS" | wc -l)
          if [ "$COUNT" -gt 2 ]; then
            OLDEST=$(echo "$LOCAL_VERSIONS" | tail -n +3)
            for OLD in $OLDEST; do
              echo "Deleting old version: $OLD"
              ID=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
                | jq -r ".[] | select(.metadata.container.tags[0]==\"$OLD\") | .id")
              gh api --method DELETE -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions/$ID
            done
          fi

          LATEST=$(echo "${{ steps.versions.outputs.versions }}" | head -n 1)
          echo "Tagging ${TARGET}:$LATEST as latest"
          docker tag "${TARGET}:$LATEST" "${TARGET}:latest"

          echo "-----> Scanning latest before push"
          trivy image --severity HIGH,CRITICAL --exit-code 1 "${TARGET}:latest"

          docker push "${TARGET}:latest"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
