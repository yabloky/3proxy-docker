name: Mirror 3proxy images to GHCR

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  TARGET_REPO: ghcr.io/yabloky/3proxy
  KEEP: "2"

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq gh

      - name: Get last 2 stable releases (from 3proxy-docker)
        id: versions
        run: |
          VERSIONS=$(curl -fsSL https://api.github.com/repos/tarampampam/3proxy-docker/releases \
            | jq -r '[ .[] | (.tag_name // empty)
                       | select(test("^[vV]?[0-9]+(\\.[0-9]+)*$")) ][0:2][]' \
            | sed 's/^[vV]//')
          echo "versions<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror last 2 versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TARGET="${{ env.TARGET_REPO }}"
          # источники: docker hub и два GHCR варианта
          SRC1="docker.io/tarampampam/3proxy"
          SRC2="ghcr.io/tarampampam/3proxy"
          SRC3="ghcr.io/tarampampam/3proxy-docker"

          LOCAL=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
            | jq -r '.[].metadata.container.tags[0]' | grep -v -E '^$|null|latest' | sort -Vr || true)

          pull_any() {
            TAG="$1"
            for IMG in "$SRC1" "$SRC2" "$SRC3"; do
              if docker manifest inspect "${IMG}:${TAG}" >/dev/null 2>&1; then
                docker pull "${IMG}:${TAG}"
                docker tag  "${IMG}:${TAG}" "${TARGET}:${TAG}"
                docker push "${TARGET}:${TAG}"
                return 0
              fi
            done
            echo "skip ${TAG}: not found upstream"
            return 1
          }

          while read -r VER; do
            [ -z "$VER" ] && continue
            echo "$LOCAL" | grep -q "^${VER}$" && continue
            pull_any "$VER" || true
          done <<< "${{ steps.versions.outputs.versions }}"

          LOCAL=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
            | jq -r '.[].metadata.container.tags[0]' | grep -v -E '^$|null|latest' | sort -Vr || true)
          CNT=$(echo "$LOCAL" | wc -l)
          if [ "$CNT" -gt "${KEEP}" ]; then
            DEL=$(echo "$LOCAL" | tail -n +$((KEEP+1)))
            for OLD in $DEL; do
              ID=$(gh api -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions \
                | jq -r ".[] | select(.metadata.container.tags[0]==\"${OLD}\") | .id")
              gh api --method DELETE -H "Accept: application/vnd.github+json" /users/${{ github.actor }}/packages/container/3proxy/versions/${ID}
            done
          fi

          LATEST=$(echo "${{ steps.versions.outputs.versions }}" | head -n 1)
          if [ -n "$LATEST" ]; then
            docker image inspect "${TARGET}:${LATEST}" >/dev/null 2>&1 || pull_any "$LATEST"
            docker tag "${TARGET}:${LATEST}" "${TARGET}:latest"
            docker push "${TARGET}:latest"
          fi
